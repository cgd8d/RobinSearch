# Print basic system info. 
name: PrintSystemInfo

on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: '0'
      - name: PrintSystemInfo
        run: |
          git rev-parse --short HEAD
          . ./scripts/PrintSystemInfo.sh
